

services:
  # 1. BASE DE DATOS
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=elgranodeoro
    ports:
      - "5432:5432"

  # 2. BACKEND (API + IA)
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - backend_data:/app/data  # Volumen persistente para SQLite
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db/elgranodeoro
    env_file:
      - ./backend/.env

  # 3. FRONTEND (React)
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
